<!doctype html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Font Family - Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Iosevka+Charon:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />

    <!-- Link de estilo com CSS -->
    <link rel="stylesheet" href="./2. style.css" />

    <!-- Script linkado ao arquivo JS -->
    <script src="./3. script.js" defer></script>

    <title>Cronômetro Digital</title>
  </head>
  <body>
    <main>
      <div class="container-stopwatch">
        <h1 class="title"><u>Timer</u></h1>
        <div class="display">00:00.00</div>

        <div class="container-btns">
          <button class="btn-start">Iniciar</button>
          <button class="btn-stop">Parar</button>
          <button class="btn-restart">Reiniciar</button>
        </div>
      </div>
    </main>

    <br />
    <footer>
      <img
        src="./Assets/Logo-Dev-IgorA.png"
        alt="logo-dev-IgorA"
        class="logo-dev"
      />
    </footer>
  </body>
</html>
